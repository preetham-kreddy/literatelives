<style>
:root{
  --ink:#1c1a17;--ink-soft:#3d3830;--ink-muted:#7a7065;
  --parchment:#f7f3ec;--parchment-deep:#ede6d6;--parchment-warm:#e8dfc8;
  --rose:#b5736a;--rose-light:#d4a099;
  --navy:#22304a;--navy-soft:#2e3f5c;
  --sepia:#8b6f47;--sepia-light:#c4a882;
  --white:#fdfaf5;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'Lato',sans-serif;font-weight:300;background:var(--parchment);color:var(--ink-soft);overflow-x:hidden;cursor:none;}

.cursor{position:fixed;width:8px;height:8px;background:var(--rose);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);mix-blend-mode:multiply;}
.cursor-ring{position:fixed;width:32px;height:32px;border:1px solid rgba(181,115,106,0.4);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:all 0.18s ease;}

.page{display:none;min-height:100vh;}
.page.active{display:block;}

nav{position:fixed;top:0;left:0;right:0;z-index:1000;padding:0 6%;height:68px;display:flex;align-items:center;justify-content:space-between;transition:all 0.4s ease;}
nav.scrolled{background:rgba(247,243,236,0.93);backdrop-filter:blur(12px);border-bottom:1px solid rgba(139,111,71,0.15);}
.nav-logo{display:flex;align-items:center;gap:11px;cursor:pointer;text-decoration:none;}
.nav-logo-mark{width:34px;height:34px;border:1px solid var(--sepia-light);border-radius:2px;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-weight:400;font-size:17px;color:var(--sepia);letter-spacing:0.05em;}
.nav-logo-text{font-family:'Cormorant Garamond',serif;font-weight:400;font-size:1.1rem;color:var(--ink);letter-spacing:0.04em;}
nav.on-dark .nav-logo-mark{border-color:rgba(255,255,255,0.3);color:rgba(255,255,255,0.8);}
nav.on-dark .nav-logo-text{color:rgba(255,255,255,0.9);}
nav.on-dark .nav-link{color:rgba(255,255,255,0.65);}
nav.on-dark .nav-link:hover{color:#fff;}
nav.on-dark .nav-cta{border-color:rgba(255,255,255,0.4);color:rgba(255,255,255,0.9)!important;}
.nav-links{display:flex;align-items:center;gap:4px;list-style:none;}
.nav-link{font-family:'Lato',sans-serif;font-weight:300;font-size:0.8rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-muted);padding:6px 12px;cursor:pointer;text-decoration:none;transition:color 0.25s;}
.nav-link:hover,.nav-link.active{color:var(--ink);}
.nav-cta{border:1px solid var(--sepia-light);color:var(--sepia)!important;padding:7px 18px!important;transition:all 0.25s!important;}
.nav-cta:hover{background:var(--sepia);color:var(--white)!important;border-color:var(--sepia)!important;}

.reveal{opacity:0;transform:translateY(40px);transition:opacity 0.8s ease,transform 0.8s ease;}
.reveal.visible{opacity:1;transform:translateY(0);}
.reveal-delay-1{transition-delay:0.1s;}.reveal-delay-2{transition-delay:0.2s;}.reveal-delay-3{transition-delay:0.3s;}.reveal-delay-4{transition-delay:0.4s;}
.reveal-left{opacity:0;transform:translateX(-50px);transition:opacity 0.9s ease,transform 0.9s ease;}
.reveal-left.visible{opacity:1;transform:translateX(0);}
.reveal-right{opacity:0;transform:translateX(50px);transition:opacity 0.9s ease,transform 0.9s ease;}
.reveal-right.visible{opacity:1;transform:translateX(0);}

.hero{min-height:100vh;background:var(--navy);display:flex;align-items:center;padding:68px 6% 0;position:relative;overflow:hidden;}
.hero-grain{position:absolute;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");opacity:0.4;pointer-events:none;}
.hero-bg-line{position:absolute;right:0;top:0;bottom:0;width:45%;background:linear-gradient(135deg,rgba(181,115,106,0.06) 0%,transparent 60%);border-left:1px solid rgba(196,168,130,0.1);}
.hero-content{max-width:700px;position:relative;z-index:2;padding-bottom:130px;}
.hero-tag{display:inline-flex;align-items:center;gap:10px;font-weight:300;font-size:0.7rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--sepia-light);margin-bottom:32px;opacity:0;animation:fadeUp 1s 0.2s ease both;}
.hero-tag::before{content:'';width:28px;height:1px;background:var(--sepia-light);}
.hero h1{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:clamp(3rem,6.5vw,6rem);color:var(--white);line-height:1.06;letter-spacing:-0.01em;margin-bottom:28px;opacity:0;animation:fadeUp 1s 0.4s ease both;}
.hero h1 em{font-style:italic;color:var(--rose-light);}

.hero-actions{display:flex;gap:16px;flex-wrap:wrap;opacity:0;animation:fadeUp 1s 0.8s ease both;}
.hero-statsbar{position:absolute;bottom:0;left:0;right:0;border-top:1px solid rgba(255,255,255,0.07);display:flex;opacity:0;animation:fadeUp 1s 1s ease both;}
.hero-stat{flex:1;padding:28px 0;text-align:center;border-right:1px solid rgba(255,255,255,0.06);position:relative;overflow:hidden;}
.hero-stat::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:0;height:1px;background:var(--rose-light);transition:width 0.6s ease;}
.hero-stat:hover::after{width:60%;}
.hero-stat:last-child{border-right:none;}
.hero-stat-num{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:clamp(1.6rem,2.5vw,2.4rem);color:rgba(253,250,245,0.9);}
.hero-stat-label{font-weight:300;font-size:0.65rem;letter-spacing:0.18em;text-transform:uppercase;color:rgba(253,250,245,0.35);margin-top:5px;}

.section{padding:110px 6%;}
.eyebrow{display:inline-flex;align-items:center;gap:14px;font-weight:300;font-size:0.68rem;letter-spacing:0.22em;text-transform:uppercase;color:var(--rose);margin-bottom:18px;}
.eyebrow::before{content:'';width:24px;height:1px;background:var(--rose);}
.section-heading{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:clamp(2.2rem,4vw,3.8rem);color:var(--ink);line-height:1.1;letter-spacing:-0.01em;margin-bottom:20px;}
.section-heading em{font-style:italic;color:var(--sepia);}
.rule{width:40px;height:1px;background:var(--sepia-light);margin:22px 0 38px;}
.body-text{font-weight:300;font-size:0.95rem;color:var(--ink-muted);line-height:1.95;letter-spacing:0.02em;max-width:580px;}

.what-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:rgba(139,111,71,0.12);border:1px solid rgba(139,111,71,0.12);margin-top:60px;}
.what-card{background:var(--white);padding:48px 36px;position:relative;overflow:hidden;transition:background 0.4s;}
.what-card::before{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--rose),var(--sepia-light));transform:scaleX(0);transform-origin:left;transition:transform 0.5s ease;}
.what-card:hover::before{transform:scaleX(1);}
.what-card:hover{background:var(--parchment);}
.what-num{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:3rem;color:rgba(139,111,71,0.15);line-height:1;margin-bottom:20px;}
.what-card h3{font-family:'Cormorant Garamond',serif;font-weight:400;font-size:1.4rem;color:var(--ink);margin-bottom:14px;}
.what-card p{font-weight:300;font-size:0.875rem;color:var(--ink-muted);line-height:1.85;}

.marquee-wrap{background:var(--navy);padding:18px 0;overflow:hidden;border-top:1px solid rgba(255,255,255,0.04);border-bottom:1px solid rgba(255,255,255,0.04);}
.marquee-track{display:flex;animation:marquee 30s linear infinite;white-space:nowrap;}
.marquee-item{display:inline-flex;align-items:center;gap:20px;padding:0 32px;font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;font-size:1rem;color:rgba(253,250,245,0.35);letter-spacing:0.06em;}
.marquee-dot{width:3px;height:3px;background:var(--rose-light);border-radius:50%;opacity:0.4;}
@keyframes marquee{from{transform:translateX(0);}to{transform:translateX(-50%);}}

.impact-wrap{background:var(--parchment-deep);padding:110px 6%;display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:center;}
.impact-quote-big{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;font-size:clamp(1.6rem,2.8vw,2.4rem);color:var(--navy);line-height:1.5;border-left:2px solid var(--rose-light);padding-left:32px;}
.impact-quote-big cite{display:block;margin-top:18px;font-style:normal;font-family:'Lato',sans-serif;font-weight:300;font-size:0.75rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--rose);}

.impact-stat-num{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:2.6rem;color:var(--navy);line-height:1;}

<script>
const D = JSON.parse(document.getElementById('siteData').textContent);
const $ = id => document.getElementById(id);

// ── Google Drive image URL converter ──────────────────────────
// Accepts any Google Drive share link and converts it to a direct embeddable URL.
// If the link isn't a Drive link (e.g. already a direct URL or a local path), it passes through unchanged.
function driveImg(url) {
  if (!url || url.trim() === '') return '';
  // Match /file/d/FILE_ID/view pattern
  const m = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
  if (m) return `https://drive.google.com/thumbnail?id=${m[1]}&sz=w800`;
  // Match id= parameter pattern
  const m2 = url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
  if (m2) return `https://drive.google.com/thumbnail?id=${m2[1]}&sz=w800`;
  // Not a Drive link — return as-is
  return url;
}

// Renders an <img> from a URL (Drive or direct), or a placeholder div if empty
function imgEl(url, alt, placeholderText) {
  const src = driveImg(url);
  if (src) return `<img src="${src}" alt="${alt}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=\\'about-img-placeholder\\'>${placeholderText}</div>'">`;
  return `<div class="about-img-placeholder">${placeholderText}</div>`;
}

function buildGallery(filter) {
  const items = filter === 'All' ? D.gallery : D.gallery.filter(g => g.category === filter);
  return items.map(g => {
    const src = driveImg(g.image);
    const cls = [(g.wide ? 'g-wide' : ''), (g.tall ? 'g-tall' : '')].join(' ').trim();
    const inner = src
      ? `<img src="${src}" alt="${g.label}" loading="lazy" style="width:100%;height:100%;object-fit:cover;display:block;" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><span style="display:none;position:absolute;inset:0;align-items:center;justify-content:center;font-size:0.72rem;color:var(--ink-muted);">[${g.label}]</span>`
      : `<span>[${g.label}]</span>`;
    return `<div class="gallery-item ${cls}" data-cat="${g.category}">${inner}</div>`;
  }).join('');
}

// Tracks the currently selected donation amount
let selectedAmount = 1000;

function pickAmt(el) {
  document.querySelectorAll('.amt-pill').forEach(a => a.classList.remove('active'));
  el.classList.add('active');
  const raw = el.textContent.replace(/[₹,]/g,'').trim();

}

function launchRazorpay() {
  if (!selectedAmount) {
    alert('Please select a donation amount.');
    return;
  }
  const options = {
    key: D.site.razorpayKeyId,
    amount: selectedAmount,            // in paise (₹1 = 100 paise)
    currency: 'INR',
    name: D.site.name,
    description: 'Library donation — ' + D.site.TrustReg,
    image: '',                         // optional: logo URL
    handler: function(response) {
      alert('Thank you for your donation! Payment ID: ' + response.razorpay_payment_id);
    },
    prefill: { name: '', email: '', contact: '' },
    notes: { trust_reg: D.site.TrustReg },
    theme: { color: '#22304a' }
  };
  const rzp = new Razorpay(options);
  rzp.on('payment.failed', function(resp){
    alert('Payment failed. Please try again or use UPI directly.');
  });
  rzp.open();
}

// ── CURSOR ────────────────────────────────────────────────────
const cursor=$('cursor'), ring=$('cursorRing');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cursor.style.left=mx+'px';cursor.style.top=my+'px';});
(function animRing(){rx+=(mx-rx)*0.12;ry+=(my-ry)*0.12;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(animRing);})();
document.addEventListener('mouseover',e=>{
  if(e.target.matches('a,button,.nav-link,.gallery-item,.blog-post,.event-card,.library-card')){ring.style.transform='translate(-50%,-50%) scale(2)';ring.style.borderColor='rgba(181,115,106,0.3)';}
  else{ring.style.transform='translate(-50%,-50%) scale(1)';ring.style.borderColor='rgba(181,115,106,0.4)';}
});

// ── SCROLL REVEAL ─────────────────────────────────────────────
const revealObs = new IntersectionObserver(entries=>{
  entries.forEach(e=>{ if(e.isIntersecting) e.target.classList.add('visible'); });
},{threshold:0.12,rootMargin:'0px 0px -40px 0px'});

function observePage(pageEl){
  pageEl.querySelectorAll('.reveal,.reveal-left,.reveal-right').forEach(el=>{
    el.classList.remove('visible');
    revealObs.observe(el);
  });
}
document.querySelectorAll('.page').forEach(observePage);

// ── NAV ───────────────────────────────────────────────────────
const nav=document.getElementById('mainNav');
function updateNav(){
  nav.classList.toggle('scrolled', window.scrollY>40);
  const activePage=document.querySelector('.page.active');
  const hasDark=activePage&&activePage.querySelector('.hero,.page-header');
  const pastHero=window.scrollY>(window.innerHeight*0.7);
  nav.classList.toggle('on-dark', !!(hasDark&&!pastHero));
}
window.addEventListener('scroll',updateNav);

// ── PAGE SWITCHER ─────────────────────────────────────────────
function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-link').forEach(a=>a.classList.remove('active'));
  const page=document.getElementById('page-'+id);
  if(page){
    page.classList.add('active');
    window.scrollTo({top:0,behavior:'instant'});
    observePage(page);
    setTimeout(()=>{
      page.querySelectorAll('.reveal,.reveal-left,.reveal-right').forEach(el=>{
        if(el.getBoundingClientRect().top<window.innerHeight*0.9) el.classList.add('visible');
      });
    },60);
  }
  const navLink=document.getElementById('nav-'+id);
  if(navLink) navLink.classList.add('active');
  updateNav();
}

function filterGallery(el, category){
  document.querySelectorAll('.gf-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  const grid = document.getElementById('galleryGrid');
  if(grid) grid.innerHTML = buildGallery(category);
}

setTimeout(()=>{
  document.querySelectorAll('#page-home .reveal, #page-home .reveal-left, #page-home .reveal-right').forEach(el=>{
    if(el.getBoundingClientRect().top<window.innerHeight*0.9) el.classList.add('visible');
  });
},100);
updateNav();
</script>
